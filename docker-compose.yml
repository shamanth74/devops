version: '3.8'

services:
  backend:
    build: ./backend
    container_name: cicd-backend
    ports:
      - '5000:5000'
    volumes:
      - ./backend/data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=5000
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cicd-frontend
    ports:
      - '3000:80'
    depends_on:
      - backend
    restart: unless-stopped
