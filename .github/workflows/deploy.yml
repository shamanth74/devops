# ============================================
# CI/CD Deployment Pipeline — REAL WORKFLOW
# ============================================
# This pipeline runs when code is pushed to main.
# It builds the app, creates a deployment request,
# waits for admin approval on the dashboard,
# then deploys if approved.
# ============================================

name: CI/CD Deployment Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # --- Step 1: Checkout the code ---
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need 2 commits to compute diff

      # --- Step 2: Setup Node.js ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- Step 3: Install and build the sample app ---
      - name: Install Sample App Dependencies
        working-directory: ./sample-app
        run: npm install

      # --- Step 4: Build Docker image for the sample app ---
      - name: Build Docker Image
        run: docker build -t sample-app:latest ./sample-app

      # --- Step 5: Get the list of changed files ---
      - name: Get Changed Files
        id: changes
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | jq -R -s -c 'split("\n") | map(select(length > 0))' || echo '["unknown"]')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Changed files: $FILES"

      # --- Step 6: Get commit info ---
      - name: Get Commit Info
        id: commit
        run: |
          echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          MSG=$(git log -1 --pretty=%B | head -1)
          echo "message=$MSG" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Create Deployment Request
        id: deploy_request
        env:
          BRANCH: ${{ steps.commit.outputs.branch }}
          MSG: ${{ steps.commit.outputs.message }}
          SHA: ${{ steps.commit.outputs.sha }}
          FILES: ${{ steps.changes.outputs.files }}
          BUILD_ID: build-${{ github.run_number }}
        run: |
          echo "🚀 Creating deployment request..."
          echo "API URL: ${{ vars.API_URL }}"

          PAYLOAD=$(jq -n '{branch: env.BRANCH, commitMessage: env.MSG, commitSha: env.SHA, changedFiles: (env.FILES | fromjson), buildId: env.BUILD_ID}')

          RESPONSE=$(curl -sf -X POST "${{ vars.API_URL }}/api/deployments" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Response: $RESPONSE"
          DEPLOY_ID=$(echo $RESPONSE | jq -r '.id')
          echo "id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "✅ Deployment request created: $DEPLOY_ID"

      # --- Step 8: Wait for admin approval ---
      # The pipeline PAUSES here and polls every 10 seconds.
      # An admin must open the dashboard and click Approve or Reject.
      - name: ⏳ Waiting for Admin Approval
        run: |
          echo "============================================"
          echo "  ⏳ WAITING FOR ADMIN APPROVAL"
          echo "  Dashboard: ${{ vars.API_URL }}"
          echo "  Deployment ID: ${{ steps.deploy_request.outputs.id }}"
          echo "============================================"
          echo ""
          echo "Open the dashboard and click Approve or Reject."
          echo "Polling every 10 seconds (timeout: 10 minutes)..."
          echo ""

          for i in $(seq 1 60); do
            STATUS=$(curl -sf "${{ vars.API_URL }}/api/deployments/${{ steps.deploy_request.outputs.id }}" | jq -r '.status')
            echo "  Poll #$i — Status: $STATUS"

            if [ "$STATUS" = "approved" ]; then
              echo ""
              echo "✅ Deployment APPROVED by admin!"
              exit 0
            elif [ "$STATUS" = "rejected" ]; then
              echo ""
              echo "❌ Deployment REJECTED by admin."
              exit 1
            fi

            sleep 10
          done

          echo "⏰ Approval timed out after 10 minutes."
          exit 1

      # --- Step 9: Deploy (mark as deployed) ---
      # This only runs if approved (Step 8 exited 0)
      - name: 🚀 Deploy
        run: |
          echo "🚀 Deploying..."
          curl -sf -X PUT "${{ vars.API_URL }}/api/deployments/${{ steps.deploy_request.outputs.id }}/deploy"
          echo ""
          echo "============================================"
          echo "  ✅ DEPLOYMENT SUCCESSFUL"
          echo "  Build: build-${{ github.run_number }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Commit: ${{ github.sha }}"
          echo "============================================"
